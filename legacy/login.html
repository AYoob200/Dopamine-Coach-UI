        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .editorial-shadow {
            box-shadow: 0px 20px 40px rgba(50, 50, 59, 0.06);
        }

<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Background Texture -->
<div class="absolute inset-0 z-0 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-primary-container/20 blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-tertiary-container/20 blur-[120px]"></div>
</div>
<!-- Main Login Canvas -->
<main class="z-10 w-full max-w-md px-6 py-12">
<div class="bg-surface-container-lowest rounded-[2rem] p-8 md:p-12 editorial-shadow transition-all duration-300">
<!-- Logo & Heading -->
<div class="flex flex-col items-center mb-10">
<div class="w-14 h-14 bg-gradient-to-br from-primary to-primary-dim rounded-2xl flex items-center justify-center mb-6 editorial-shadow">
<span class="material-symbols-outlined text-on-primary text-3xl" data-icon="spa" style="font-variation-settings: 'FILL' 1;">spa</span>
</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface mb-2">The Sanctuary</h1>
<p class="text-on-surface-variant font-medium opacity-70">Welcome Back</p>
</div>
<!-- Login Form -->
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-sm font-label font-semibold text-on-surface-variant ml-1">Email Address</label>
<div class="relative">
<input class="w-full h-14 px-5 bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all duration-200 text-on-surface placeholder:text-outline-variant" placeholder="name@sanctuary.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-sm font-label font-semibold text-on-surface-variant">Password</label>
<a class="text-xs font-semibold text-primary hover:text-primary-dim transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full h-14 px-5 bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all duration-200 text-on-surface placeholder:text-outline-variant" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Login Button -->
<button class="w-full h-14 bg-primary text-on-primary font-headline font-bold rounded-xl editorial-shadow hover:bg-primary-dim active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2" type="submit">
                    Login
                    <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-10">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/15"></div>
</div>
<div class="relative flex justify-center text-xs">
<span class="px-4 bg-surface-container-lowest text-outline text-xs uppercase tracking-widest font-bold">Or continue with</span>
</div>
</div>
<!-- Social Login -->
<button class="w-full h-14 border border-outline-variant/20 rounded-xl flex items-center justify-center gap-3 hover:bg-surface-container-low active:scale-[0.98] transition-all duration-200 group">
<svg height="20" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-semibold text-on-surface text-sm">Google Account</span>
</button>
<!-- Bottom CTA -->
<p class="mt-10 text-center text-sm text-on-surface-variant font-medium">
                Don't have an account? 
                <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Sign up</a>
</p>
</div>
<!-- Footer Text -->
<footer class="mt-8 text-center">
<p class="text-xs text-outline-variant font-medium tracking-wide">© 2024 DOPAMINE STUDIO • DESIGNED FOR CALM</p>
</footer>
</main>
